<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Questionnaire Deburring Machine</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.4;
      max-width: 900px;
    }
    h1, h2 {
      margin-bottom: 6px;
    }
    .section {
      border: 1px solid #ccc;
      padding: 16px;
      margin-bottom: 18px;
      border-radius: 6px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      flex: 1;
    }
    label {
      font-size: 0.9rem;
      margin-bottom: 4px;
    }
    input[type="text"],
    textarea {
      padding: 6px 8px;
      font-size: 0.9rem;
      border: 1px solid #aaa;
      border-radius: 4px;
      width: 100%;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 60px;
    }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    #downloadBtn {
      padding: 10px 20px;
      font-size: 1rem;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #downloadBtn:hover {
      background: #005fa3;
    }
  </style>
</head>

<body>

<h1>Questionnaire Deburring Machine</h1>
<p>Ident. No. FL7701 EN &nbsp;&nbsp; Rev. 03</p>

<form id="formContent">

  <!-- CUSTOMER INFO -->
  <div class="section">
    <h2>Customer information</h2>
    <div class="row">
      <div class="field">
        <label>Customer</label>
        <input type="text" name="customer">
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text" name="address">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Contact person</label>
        <input type="text" name="contact_person">
      </div>
      <div class="field">
        <label>Phone</label>
        <input type="text" name="phone">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="text" name="email">
      </div>
    </div>
  </div>

  <!-- CUTTING METHODS -->
  <div class="section">
    <h2>Cutting methods</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> CO₂ laser</label>
      <label class="checkbox-item"><input type="checkbox"> Fiber laser</label>
      <label class="checkbox-item"><input type="checkbox"> Plasma</label>
      <label class="checkbox-item"><input type="checkbox"> Oxyfuel</label>
      <label class="checkbox-item"><input type="checkbox"> Other</label>
    </div>
  </div>

  <!-- MATERIALS -->
  <div class="section">
    <h2>Materials</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> Steel</label>
      <label class="checkbox-item"><input type="checkbox"> Stainless steel</label>
      <label class="checkbox-item"><input type="checkbox"> Aluminium</label>
      <label class="checkbox-item"><input type="checkbox"> Titanium</label>
      <label class="checkbox-item"><input type="checkbox"> Other</label>
    </div>
  </div>

  <!-- DIMENSIONS -->
  <div class="section">
    <h2>Dimensions</h2>
    <div class="row">
      <div class="field">
        <label>Length min</label>
        <input type="text">
      </div>
      <div class="field">
        <label>Length max</label>
        <input type="text">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Width min</label>
        <input type="text">
      </div>
      <div class="field">
        <label>Width max</label>
        <input type="text">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Thickness typical (80%)</label>
        <input type="text">
      </div>
      <div class="field">
        <label>Quantity / week</label>
        <input type="text">
      </div>
    </div>
  </div>

  <!-- INITIAL CONDITION -->
  <div class="section">
    <h2>Initial condition</h2>
    <div class="row">
      <div class="field">
        <label>Slag bottom / top</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="radio" name="slag"> &lt; 1 mm</label>
          <label class="checkbox-item"><input type="radio" name="slag"> 1–3 mm</label>
          <label class="checkbox-item"><input type="radio" name="slag"> &gt; 3 mm</label>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Burr bottom / top</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="radio" name="burr"> &lt; 1 mm</label>
          <label class="checkbox-item"><input type="radio" name="burr"> 1–3 mm</label>
          <label class="checkbox-item"><input type="radio" name="burr"> &gt; 3 mm</label>
        </div>
      </div>
    </div>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> Sprinkles / spots</label>
      <label class="checkbox-item"><input type="checkbox"> Foil coated</label>
      <label class="checkbox-item"><input type="checkbox"> Oily</label>
      <label class="checkbox-item"><input type="checkbox"> Coated</label>
    </div>
  </div>

  <!-- PROCESS OBJECTIVES -->
  <div class="section">
    <h2>Process objectives</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> One-sided processing</label>
      <label class="checkbox-item"><input type="checkbox"> Two-sided processing</label>
      <label class="checkbox-item"><input type="checkbox"> Slag removal</label>
      <label class="checkbox-item"><input type="checkbox"> Burr removal</label>
      <label class="checkbox-item"><input type="checkbox"> Oxide layer removal</label>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>Surface treatment (requirements)</label>
      <textarea></textarea>
    </div>
  </div>

  <!-- EDGE PROCESSING -->
  <div class="section">
    <h2>Edge processing</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> Break sharp edges</label>
      <label class="checkbox-item"><input type="checkbox"> Rounding of sharp edges</label>
    </div>
    <div class="checkbox-group" style="margin-top:10px;">
      <label class="checkbox-item"><input type="radio" name="rounding"> &lt; 0.3 mm</label>
      <label class="checkbox-item"><input type="radio" name="rounding"> &lt; 1 mm</label>
      <label class="checkbox-item"><input type="radio" name="rounding"> max. 2 mm radius</label>
    </div>
  </div>

  <!-- ACCESSORIES -->
  <div class="section">
    <h2>Accessories</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> Extraction unit</label>
      <label class="checkbox-item"><input type="checkbox"> Conveyors / curve</label>
      <label class="checkbox-item"><input type="checkbox"> Others</label>
    </div>
    <div class="field" style="margin-top:10px;">
      <label>If others, specify</label>
      <input type="text">
    </div>
  </div>

  <!-- PLANNING -->
  <div class="section">
    <h2>Planning</h2>
    <div class="field">
      <label>Planned realization / rough budget</label>
      <textarea></textarea>
    </div>
    <div class="field" style="margin-top:12px;">
      <label>Other planning notes</label>
      <textarea></textarea>
    </div>
  </div>

  <!-- NOTES -->
  <div class="section">
    <h2>Notes</h2>
    <textarea style="width:100%; height:80px;"></textarea>
  </div>

</form>

<button id="downloadBtn">Download PDF</button>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const element = document.getElementById("formContent");

    const options = {
      margin: 10,
      filename: 'deburring_questionnaire.pdf',
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(options).from(element).save();
  });
</script>

</body>
</html>
