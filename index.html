<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deburring Questionnaire – A4 Optimized</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
    }

    /* A4 page container */
    .a4 {
      width: 210mm;
      min-height: 297mm;
      padding: 15mm 20mm;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      box-sizing: border-box;
    }

    h1, h2 {
      margin-bottom: 6px;
    }

    .section {
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 4px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 180px;
    }

    input[type="text"],
    textarea {
      padding: 6px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font-size: 0.9rem;
      width: 100%;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }

    #downloadBtn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1rem;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #downloadBtn:hover {
      background: #005fa3;
    }
  </style>
</head>

<body>

<div class="a4" id="formContent">

  <h1>Questionnaire Deburring Machine</h1>
  <p>Ident. No. FL7701 EN &nbsp;&nbsp; Rev. 03</p>

  <!-- CUSTOMER INFORMATION -->
  <div class="section">
    <h2>Customer information</h2>

    <div class="row">
      <div class="field">
        <label>Customer</label>
        <input type="text">
      </div>
      <div class="field">
        <label>Address</label>
        <input type="text">
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Contact person</label>
        <input type="text">
      </div>
      <div class="field">
        <label>Phone</label>
        <input type="text">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="text">
      </div>
    </div>
  </div>

  <!-- CUTTING METHODS -->
  <div class="section">
    <h2>Cutting methods</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> CO₂ laser</label>
      <label class="checkbox-item"><input type="checkbox"> Fiber laser</label>
      <label class="checkbox-item"><input type="checkbox"> Plasma</label>
      <label class="checkbox-item"><input type="checkbox"> Oxyfuel</label>
      <label class="checkbox-item"><input type="checkbox"> Other</label>
    </div>
  </div>

  <!-- MATERIALS -->
  <div class="section">
    <h2>Materials</h2>
    <div class="checkbox-group">
      <label class="checkbox-item"><input type="checkbox"> Steel</label>
      <label class="checkbox-item"><input type="checkbox"> Stainless steel</label>
      <label class="checkbox-item"><input type="checkbox"> Aluminium</label>
      <label class="checkbox-item"><input type="checkbox"> Titanium</label>
      <label class="checkbox-item"><input type="checkbox"> Other</label>
    </div>
  </div>

</div>

<button id="downloadBtn">Download PDF</button>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const element = document.getElementById("formContent");

    html2pdf()
      .set({
        margin: 0,
        filename: 'deburring_questionnaire.pdf',
        html2canvas: {
          scale: 2,
          scrollY: -window.scrollY,
          windowHeight: document.body.scrollHeight
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      })
      .from(element)
      .save();
  });
</script>

</body>
</html>
